# nginx site config for the IMS SPA.
# Two responsibilities:
#   1. Serve the built Vite bundle from /usr/share/nginx/html.
#   2. Send any non-asset path back to index.html so React Router can resolve it.
#
# CORS / TLS / API reverse-proxying are intentionally out of scope here — those
# belong on the edge proxy (Traefik, Cloudflare, the Fedora nginx config in
# deploy/fedora/, etc.) so this image stays portable across environments.

server {
    listen      80;
    listen      [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Hashed assets are immutable — let the browser cache them aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history-mode fallback. Must come last so it doesn't shadow the asset rule.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't leak the nginx version banner.
    server_tokens off;

    # Tiny security headers — bare minimum for a static SPA. Tighten further at
    # the edge if you have a CSP/Permissions-Policy strategy.
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
